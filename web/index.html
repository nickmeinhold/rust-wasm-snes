<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>SNES — A Link to the Past</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            color: #eee;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 {
            font-size: 1.2rem;
            color: #c8a84e;
            margin-bottom: 0.5rem;
            letter-spacing: 0.1em;
        }
        #screen {
            border: 3px solid #333;
            border-radius: 4px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            cursor: none;
        }
        .controls {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #666;
            text-align: center;
            line-height: 1.6;
        }
        .controls kbd {
            background: #222;
            border: 1px solid #444;
            border-radius: 3px;
            padding: 1px 5px;
            font-size: 0.75rem;
        }
        #status {
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: #555;
        }
        #drop-zone {
            border: 2px dashed #444;
            border-radius: 8px;
            padding: 3rem 4rem;
            text-align: center;
            color: #666;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }
        #drop-zone:hover, #drop-zone.dragover {
            border-color: #c8a84e;
            color: #c8a84e;
        }
        #drop-zone input { display: none; }
    </style>
</head>
<body>
    <h1>SNES — Rust/WASM Emulator</h1>

    <!-- ROM loader (shown before game starts) -->
    <div id="drop-zone">
        <p>Drop your <strong>.smc</strong> ROM here</p>
        <p style="margin-top: 0.5rem; font-size: 0.8rem">or click to browse</p>
        <input type="file" id="rom-input" accept=".smc,.sfc,.zip">
        <div id="rom-picker" style="margin-top: 1rem; display: none">
            <p style="font-size: 0.8rem; color: #888; margin-bottom: 0.5rem">or pick from the Internet Archive:</p>
            <input type="text" id="rom-search" placeholder="Search 746 SNES ROMs..."
                style="background: #1a1a1a; color: #eee; border: 1px solid #444; border-radius: 4px;
                       padding: 6px 10px; width: 260px; font-family: inherit; font-size: 0.8rem;">
            <div id="rom-list" style="max-height: 200px; overflow-y: auto; margin-top: 0.5rem;
                text-align: left; font-size: 0.75rem;"></div>
        </div>
    </div>

    <!-- Game canvas (hidden until ROM loaded) -->
    <canvas id="screen" width="256" height="224" style="display: none"></canvas>

    <div class="controls">
        <kbd>←</kbd><kbd>↑</kbd><kbd>↓</kbd><kbd>→</kbd> Move &nbsp;
        <kbd>Z</kbd> B &nbsp; <kbd>X</kbd> Y &nbsp;
        <kbd>A</kbd> A &nbsp; <kbd>S</kbd> X &nbsp;
        <kbd>Q</kbd> L &nbsp; <kbd>W</kbd> R &nbsp;
        <kbd>Enter</kbd> Start &nbsp; <kbd>Tab</kbd> Select
    </div>
    <div id="status"></div>

    <script type="module">
        import init, { Emulator } from './pkg/zelda_a_link_to_the_past.js';

        let emulator = null;
        let animFrameId = null;

        const canvas = document.getElementById('screen');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const dropZone = document.getElementById('drop-zone');
        const romInput = document.getElementById('rom-input');

        // Scale the canvas display size (CSS pixels) while keeping
        // the internal resolution at native 256×224.
        const SCALE = 3;
        canvas.style.width = `${256 * SCALE}px`;
        canvas.style.height = `${224 * SCALE}px`;

        // ── Button mapping ────────────────────────────────────
        const KEY_MAP = {
            'KeyZ':      0x8000, // B
            'KeyX':      0x4000, // Y
            'Tab':       0x2000, // Select
            'Enter':     0x1000, // Start
            'ArrowUp':   0x0800,
            'ArrowDown': 0x0400,
            'ArrowLeft': 0x0200,
            'ArrowRight':0x0100,
            'KeyA':      0x0080, // A
            'KeyS':      0x0040, // X
            'KeyQ':      0x0020, // L
            'KeyW':      0x0010, // R
        };

        // ── ROM loading ───────────────────────────────────────

        dropZone.addEventListener('click', () => romInput.click());
        romInput.addEventListener('change', (e) => loadFile(e.target.files[0]));

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                loadFile(e.dataTransfer.files[0]);
            }
        });

        async function loadFile(file) {
            if (!file) return;
            status.textContent = `Loading ${file.name}...`;

            let data;
            if (file.name.endsWith('.zip')) {
                // Basic ZIP support: find the .smc/.sfc inside
                status.textContent = 'ZIP files not yet supported — please extract the .smc first';
                return;
            } else {
                data = new Uint8Array(await file.arrayBuffer());
            }

            await startEmulator(data);
        }

        // ── Internet Archive ROM picker ─────────────────────
        const ARCHIVE_COLLECTION = 'MySnesRoms';
        const ARCHIVE_DL = `https://archive.org/download/${ARCHIVE_COLLECTION}/`;
        let romCatalog = []; // [{name, title, size}]

        (async () => {
            // Try auto-load local ROM first.
            try {
                const resp = await fetch('rom/zelda3.smc');
                if (resp.ok) {
                    const data = new Uint8Array(await resp.arrayBuffer());
                    status.textContent = 'Auto-loading ROM...';
                    await startEmulator(data);
                    return;
                }
            } catch (_) {}

            // Fetch ROM catalog from Internet Archive metadata API.
            try {
                const resp = await fetch(`https://archive.org/metadata/${ARCHIVE_COLLECTION}`);
                if (!resp.ok) throw new Error('metadata fetch failed');
                const meta = await resp.json();
                romCatalog = meta.files
                    .filter(f => /\.(smc|sfc)$/i.test(f.name))
                    .map(f => ({
                        name: f.name,
                        title: f.name.replace(/\.(smc|sfc)$/i, '')
                            .replace(/([a-z])([A-Z])/g, '$1 $2')
                            .replace(/([a-zA-Z])(\d)/g, '$1 $2')
                            .replace(/[ue]$/, ''), // strip region suffix
                        size: Math.round(parseInt(f.size) / 1024),
                    }))
                    .sort((a, b) => a.title.localeCompare(b.title));

                document.getElementById('rom-picker').style.display = 'block';
                renderRomList('');

                document.getElementById('rom-search').addEventListener('input', (e) => {
                    renderRomList(e.target.value);
                });
            } catch (err) {
                console.warn('Failed to load ROM catalog:', err);
            }
        })();

        function renderRomList(filter) {
            const list = document.getElementById('rom-list');
            const term = filter.toLowerCase();
            const matches = romCatalog.filter(r => r.title.toLowerCase().includes(term));
            const shown = matches.slice(0, 50); // Cap displayed results

            list.innerHTML = shown.map(r =>
                `<div class="rom-entry" data-name="${r.name}"
                      style="padding: 4px 8px; cursor: pointer; border-bottom: 1px solid #222;"
                      onmouseover="this.style.background='#2a2a2a'"
                      onmouseout="this.style.background='transparent'">
                    ${r.title} <span style="color:#555">(${r.size} KB)</span>
                </div>`
            ).join('');

            if (matches.length > 50) {
                list.innerHTML += `<div style="padding: 4px 8px; color: #555">... ${matches.length - 50} more — type to filter</div>`;
            }

            // Click handler for ROM entries.
            list.querySelectorAll('.rom-entry').forEach(el => {
                el.addEventListener('click', () => loadArchiveRom(el.dataset.name));
            });
        }

        const CORS_PROXY = 'https://snes-cors-proxy.nick-meinhold.workers.dev/?url=';

        async function loadArchiveRom(filename) {
            const url = ARCHIVE_DL + encodeURIComponent(filename);
            status.textContent = `Downloading ${filename}...`;
            try {
                const resp = await fetch(CORS_PROXY + encodeURIComponent(url));
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = new Uint8Array(await resp.arrayBuffer());
                if (data.length < 1024) throw new Error('Response too small');
                status.textContent = `Loaded ${filename} (${Math.round(data.length/1024)} KB)`;
                await startEmulator(data);
            } catch (err) {
                console.warn('Proxy fetch failed:', err);
                window.open(url, '_blank');
                dropZone.classList.add('dragover');
                status.innerHTML = `Download started — drag the file onto the box above.`;
                setTimeout(() => dropZone.classList.remove('dragover'), 5000);
            }
        }

        // ── Emulator lifecycle ────────────────────────────────

        async function startEmulator(romData) {
            console.log('Initializing WASM...');
            await init();
            console.log('WASM ready. Creating emulator...');

            try {
                emulator = new Emulator(romData);
            } catch (e) {
                status.textContent = `Error: ${e}`;
                console.error('Emulator error:', e);
                return;
            }
            console.log('Emulator created! Starting game loop...');

            // Show canvas, hide drop zone
            dropZone.style.display = 'none';
            canvas.style.display = 'block';
            canvas.focus();

            // ── Web Audio setup ─────────────────────────────────
            // Efficient ring buffer: fixed-size Float32Array with read/write cursors.
            // Avoids Array.shift() which is O(n) and freezes on large buffers.
            const RING_SIZE = 65536; // Must be power of 2
            const ringL = new Float32Array(RING_SIZE);
            const ringR = new Float32Array(RING_SIZE);
            let ringWrite = 0;
            let ringRead = 0;

            let audioCtx = null;
            let audioStarted = false;

            function initAudio() {
                if (audioStarted) return;
                audioStarted = true;
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)({
                        sampleRate: 32000
                    });
                    const processor = audioCtx.createScriptProcessor(1024, 0, 2);
                    processor.onaudioprocess = (e) => {
                        const left = e.outputBuffer.getChannelData(0);
                        const right = e.outputBuffer.getChannelData(1);
                        for (let i = 0; i < left.length; i++) {
                            if (ringRead !== ringWrite) {
                                left[i] = ringL[ringRead & (RING_SIZE - 1)];
                                right[i] = ringR[ringRead & (RING_SIZE - 1)];
                                ringRead++;
                            } else {
                                left[i] = 0;
                                right[i] = 0;
                            }
                        }
                    };
                    processor.connect(audioCtx.destination);
                    console.log('Audio initialized: 32kHz stereo');
                } catch (err) {
                    console.warn('Audio init failed:', err);
                }
            }

            // Start audio on first user interaction (browser autoplay policy).
            const startAudioOnGesture = () => {
                initAudio();
                document.removeEventListener('keydown', startAudioOnGesture);
                document.removeEventListener('click', startAudioOnGesture);
            };
            document.addEventListener('keydown', startAudioOnGesture);
            document.addEventListener('click', startAudioOnGesture);

            // Start the game loop
            let lastTime = performance.now();
            let frameAccumulator = 0;
            const FRAME_TIME = 1000 / 60.0988; // NTSC ~60.1 fps

            function gameLoop(now) {
                frameAccumulator += now - lastTime;
                lastTime = now;

                // Run up to 2 frames per rAF to catch up, but cap to avoid spiral
                let framesRun = 0;
                while (frameAccumulator >= FRAME_TIME && framesRun < 2) {
                    const rgba = emulator.run_frame();
                    const imageData = new ImageData(new Uint8ClampedArray(rgba), 256, 224);
                    ctx.putImageData(imageData, 0, 0);

                    // Always drain audio samples to prevent Rust-side accumulation.
                    const samples = emulator.get_audio_samples();
                    if (audioStarted && samples.length >= 2) {
                        // Write interleaved i16 stereo samples to ring buffer.
                        const available = (ringWrite - ringRead) >>> 0;
                        const maxWrite = RING_SIZE - available - 1; // Leave 1 slot gap
                        const stereoSamples = Math.min(samples.length >> 1, maxWrite);
                        for (let i = 0; i < stereoSamples; i++) {
                            const idx = ringWrite & (RING_SIZE - 1);
                            ringL[idx] = samples[i * 2] / 32768;
                            ringR[idx] = samples[i * 2 + 1] / 32768;
                            ringWrite++;
                        }
                    }

                    frameAccumulator -= FRAME_TIME;
                    framesRun++;
                }

                if (frameAccumulator > FRAME_TIME * 3) {
                    frameAccumulator = 0; // Reset if too far behind
                }

                const fc = emulator.frame_count();
                if (fc % 30n === 0n) {
                    const dbg = emulator.dump_full_state();
                    console.log(dbg);
                    status.textContent = `Frame ${fc}`;
                }

                animFrameId = requestAnimationFrame(gameLoop);
            }

            animFrameId = requestAnimationFrame(gameLoop);
        }

        // ── Input handling ────────────────────────────────────

        document.addEventListener('keydown', (e) => {
            if (!emulator) return;
            const btn = KEY_MAP[e.code];
            if (btn !== undefined) {
                e.preventDefault();
                emulator.set_button(btn, true);
                console.log('DOWN:', e.code, '→', btn.toString(16));
            }
        });

        document.addEventListener('keyup', (e) => {
            if (!emulator) return;
            const btn = KEY_MAP[e.code];
            if (btn !== undefined) {
                e.preventDefault();
                emulator.set_button(btn, false);
            }
        });
    </script>
</body>
</html>
